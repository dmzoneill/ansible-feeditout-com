---
- name: Ensure MariaDB is installed
  apt:
    name: mariadb-server
    state: present

- name: Ensure /etc/mysql exists
  file:
    path: /etc/mysql
    state: directory
    mode: '0755'

- name: Backup existing MySQL config before applying changes
  archive:
    path: /etc/mysql/
    dest: "/tmp/mysql-config-backup-{{ ansible_date_time.date }}.tar.gz"
    mode: '0600'
  ignore_errors: true

- name: Copy all configuration files to /etc/mysql/
  copy:
    src: "{{ mysql_conf }}"
    dest: "/etc/mysql/{{ mysql_conf | basename }}"
    owner: root
    group: root
  with_fileglob:
    - "{{ role_path }}/files/*"
  loop_control:
    loop_var: mysql_conf
  when: "'debian-start' not in mysql_conf"
  register: copied_mysql_configs

- name: Copy /etc/mysql/debian-start preserving mode
  copy:
    src: "{{ role_path }}/files/debian-start"
    dest: /etc/mysql/debian-start
    owner: root
    group: root
  register: copied_debian_start

- name: Copy mariadb.conf.d/ configuration directory
  copy:
    src: "{{ role_path }}/files/mariadb.conf.d/"
    dest: /etc/mysql/mariadb.conf.d/
    owner: root
    group: root
    mode: '0644'
  register: copied_mariadb_confd

- name: Restart MariaDB service if config changed
  service:
    name: mariadb
    state: restarted
  when: copied_mysql_configs is changed or copied_debian_start is changed or copied_mariadb_confd is changed

- name: Ensure MariaDB service is enabled and started
  systemd:
    name: mariadb
    enabled: true
    state: started
