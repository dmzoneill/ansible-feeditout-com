---
- name: Validate required variables
  assert:
    that:
      - litellm_master_key is defined
      - litellm_postgres_password is defined
    fail_msg: "litellm_master_key and litellm_postgres_password must be defined (expected from vault)"

- name: Install docker-compose
  apt:
    name:
      - docker.io
      - docker-compose
    state: present
  tags: [litellm]

- name: Create LiteLLM directory
  file:
    path: /opt/litellm
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [litellm]

- name: Deploy GCP credentials
  copy:
    content: "{{ litellm_gcp_adc_json }}"
    dest: /opt/litellm/adc.json
    owner: root
    group: root
    mode: '0600'
  notify: Restart LiteLLM
  tags: [litellm]

- name: Deploy LiteLLM config
  template:
    src: config.yaml.j2
    dest: /opt/litellm/config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: Restart LiteLLM
  tags: [litellm]

- name: Deploy LiteLLM environment file
  template:
    src: env.j2
    dest: /opt/litellm/.env
    owner: root
    group: root
    mode: '0600'
  notify: Restart LiteLLM
  tags: [litellm]

- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: /opt/litellm/docker-compose.yml
    owner: root
    group: root
    mode: '0644'
  notify: Restart LiteLLM
  tags: [litellm]

- name: Ensure Docker service is running and iptables chains exist
  systemd:
    name: docker
    state: started
  tags: [litellm]

- name: Start LiteLLM services
  command: docker compose up -d
  args:
    chdir: /opt/litellm
  register: litellm_compose_up
  changed_when: "'Started' in litellm_compose_up.stderr or 'Creating' in litellm_compose_up.stderr"
  tags: [litellm]

- name: Wait for LiteLLM API to be ready
  uri:
    url: "http://127.0.0.1:{{ litellm_port }}/health"
    method: GET
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
    status_code: 200
  register: litellm_health
  until: litellm_health.status == 200
  retries: 30
  delay: 5
  tags: [litellm]

- name: Register user API keys
  uri:
    url: "http://127.0.0.1:{{ litellm_port }}/key/generate"
    method: POST
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ litellm_key_entry.body }}"
    status_code: [200, 201]
  loop:
    - body:
        key: "{{ litellm_user_key_dave }}"
        user_id: "dave"
        key_alias: "dave-key"
        models: ["claude-opus-vertex"]
    - body:
        key: "{{ litellm_user_key_hugo }}"
        user_id: "hugo"
        key_alias: "hugo-key"
        models: ["claude-opus-vertex"]
        max_budget: 25.0
        budget_duration: "30d"
  loop_control:
    loop_var: litellm_key_entry
    label: "{{ litellm_key_entry.body.user_id }}"
  register: key_result
  failed_when: key_result.status not in [200, 201] and 'already exists' not in (key_result.json.error.message | default(''))
  changed_when: key_result.status in [200, 201]
  tags: [litellm]
