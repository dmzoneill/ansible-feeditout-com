---
- name: Apply kernel hardening parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop: "{{ kernel_params | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  when: kernel_params is defined

- name: Remove kernel.modules_disabled from sysctl.conf
  lineinfile:
    path: /etc/sysctl.conf
    regexp: '^kernel\.modules_disabled'
    state: absent
  ignore_errors: true

- name: Find sysctl config files on remote
  find:
    paths: /etc/sysctl.d
    patterns: "*.conf"
  register: sysctl_files

- name: Remove kernel.modules_disabled from sysctl configs
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^kernel\.modules_disabled'
    state: absent
  loop: "{{ sysctl_files.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Disable usb-storage kernel module
  copy:
    dest: /etc/modprobe.d/usb-storage.conf
    content: |
      install usb-storage /bin/true
    owner: root
    group: root
    mode: '0644'

- name: Install USBGuard
  apt:
    name: usbguard
    state: present

- name: Enable and start USBGuard
  systemd:
    name: usbguard
    enabled: true
    state: started
