---
- name: Install postsrsd
  apt:
    name: postsrsd
    state: present

- name: Copy postsrsd secret to /etc
  copy:
    src: "{{ role_path }}/files/postsrsd.secret"
    dest: /etc/postsrsd.secret
    owner: root
    group: root
    mode: '0600'
  notify: Restart postsrsd

- name: Update postsrsd config
  template:
    src: postsrsd.j2
    dest: /etc/default/postsrsd
    owner: root
    group: root
    mode: '0644'
  notify: Restart postsrsd

- name: Enable and start postsrsd service
  service:
    name: postsrsd
    enabled: true
    state: started
