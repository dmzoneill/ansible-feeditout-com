---
- name: Ensure rsyslog is installed
  apt:
    name: rsyslog
    state: present

- name: Check if /var/log/mail.log exists
  ansible.builtin.stat:
    path: /var/log/mail.log
  register: mail_log_stat

- name: Create /var/log/mail.log if it does not exist
  ansible.builtin.file:
    path: /var/log/mail.log
    state: touch
    owner: root
    group: adm
    mode: '0640'
  when: not mail_log_stat.stat.exists
  register: mail_log_file

- name: Restart rsyslog if /var/log/mail.log was created
  ansible.builtin.service:
    name: rsyslog
    state: restarted
  when: mail_log_file is changed

- name: Ensure journald override directory exists
  file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: '0755'

- name: Configure journald size limits
  copy:
    content: |
      [Journal]
      SystemMaxUse=500M
      SystemKeepFree=1G
    dest: /etc/systemd/journald.conf.d/size-limits.conf
    owner: root
    group: root
    mode: '0644'
  register: journald_config

- name: Restart journald if config changed
  systemd:
    name: systemd-journald
    state: restarted
  when: journald_config is changed
