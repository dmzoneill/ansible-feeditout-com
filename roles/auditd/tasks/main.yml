---
- name: Install auditd and supporting plugins
  apt:
    name:
      - auditd
      - audispd-plugins
    state: present

- name: Ensure /etc/audit and rules.d directories exist
  file:
    path: "{{ audit_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  loop:
    - /etc/audit
    - /etc/audit/rules.d
  loop_control:
    loop_var: audit_dir

- name: Deploy audit rules to rules.d
  copy:
    src: "{{ audit_file }}"
    dest: "/etc/audit/rules.d/{{ audit_file | basename }}"
    owner: root
    group: root
    mode: '0640'
  loop: "{{ lookup('fileglob', role_path + '/files/*.rules', wantlist=True) }}"
  loop_control:
    loop_var: audit_file
  notify: Reload Auditd Rules

- name: Enable and start auditd
  systemd:
    name: auditd
    enabled: true
    state: started

- name: Ensure sysstat is installed
  apt:
    name: sysstat
    state: present

- name: Enable data collection in sysstat config
  lineinfile:
    path: /etc/default/sysstat
    regexp: '^ENABLED='
    line: 'ENABLED="true"'
  notify: Restart Sysstat Timers

- name: Enable and start sysstat timers
  systemd:
    name: "{{ sysstat_timer }}"
    enabled: true
    state: started
  loop:
    - sysstat-collect.timer
    - sysstat-summary.timer
  loop_control:
    loop_var: sysstat_timer

- name: Deploy auditd email alert script
  template:
    src: auditd-alert.sh.j2
    dest: /etc/cron.daily/auditd-alert
    owner: root
    group: root
    mode: '0755'
