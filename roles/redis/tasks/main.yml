---
# roles/redis/tasks/main.yml

- name: Install Redis and Webdis
  apt:
    name:
      - redis-server
      - webdis
    state: present

- name: Create Redis TLS directory
  file:
    path: /etc/redis/tls
    state: directory
    owner: redis
    group: redis
    mode: '0755'

- name: Check if Redis TLS cert exists
  stat:
    path: /etc/redis/tls/redis.crt
  register: redis_cert_stat

- name: Check Redis TLS cert expiry
  command: openssl x509 -checkend 2592000 -noout -in /etc/redis/tls/redis.crt
  register: redis_cert_expiry
  changed_when: false
  failed_when: false
  when: redis_cert_stat.stat.exists

- name: Remove expired or expiring Redis TLS cert
  file:
    path: "/etc/redis/tls/{{ item }}"
    state: absent
  loop:
    - redis.crt
    - redis.key
  when: redis_cert_stat.stat.exists and redis_cert_expiry.rc != 0

- name: Generate self-signed cert and key
  command: >
    openssl req -x509 -newkey rsa:4096 -sha256 -days 365 -nodes
    -keyout /etc/redis/tls/redis.key -out /etc/redis/tls/redis.crt
    -subj "/CN=redis.local"
  args:
    creates: /etc/redis/tls/redis.crt

- name: Set permissions on cert files
  file:
    path: "/etc/redis/tls/{{ cert_file }}"
    owner: redis
    group: redis
    mode: "0600"
  loop:
    - redis.crt
    - redis.key
  loop_control:
    loop_var: cert_file

- name: Ensure /run/redis exists for PID file
  file:
    path: /run/redis
    state: directory
    owner: redis
    group: redis
    mode: "0755"

- name: Copy full redis.conf with TLS + password + no persistence
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: "0640"
  no_log: true
  notify:
    - Reload systemd daemon
    - Reload systemd unit files
    - Restart Redis

- name: Ensure systemd override directory exists
  file:
    path: /etc/systemd/system/redis-server.service.d
    state: directory
    mode: "0755"

- name: Override systemd Redis service to support daemonize (Type=forking)
  copy:
    dest: /etc/systemd/system/redis-server.service.d/override.conf
    content: |
      [Service]
      Type=forking
      ExecStart=
      ExecStart=/usr/bin/redis-server /etc/redis/redis.conf
      PIDFile=/run/redis/redis-server.pid
  notify:
    - Reload systemd daemon
    - Reload systemd unit files
    - Restart Redis

- meta: flush_handlers

- name: Enable Redis on boot
  systemd:
    name: redis-server
    enabled: true
    state: started

- name: Copy full webdis.json
  template:
    src: webdis.json.j2
    dest: /etc/webdis/webdis.json
    owner: redis
    group: redis
    mode: "0640"
  no_log: true
  notify:
    - Restart Webdis

- meta: flush_handlers

- name: Enable Webdis on boot
  systemd:
    name: webdis
    enabled: true
    state: started
  changed_when: false
