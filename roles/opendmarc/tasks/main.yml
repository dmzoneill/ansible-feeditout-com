---
- name: Install OpenDMARC
  apt:
    name: opendmarc
    state: present

- name: Recursively copy OpenDMARC configuration to /etc/opendmarc
  copy:
    src: "{{ role_path }}/files/opendmarc/"
    dest: /etc/opendmarc/
    owner: root
    group: root
    mode: preserve
    directory_mode: '0755'
  notify: Restart opendmarc

- name: Update opendmarc.conf config
  template:
    src: opendmarc.conf.j2
    dest: /etc/opendmarc/opendmarc.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart opendmarc

- name: Ensure postfix private socket directory for OpenDMARC exists
  file:
    path: /var/spool/postfix/private
    state: directory
    owner: postfix
    group: postfix
    mode: '0750'

- name: Enable and start OpenDMARC service
  service:
    name: opendmarc
    enabled: true
    state: started
